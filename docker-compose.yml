services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: vane-postgres
    environment:
      POSTGRES_USER: vane
      POSTGRES_PASSWORD: vane
      POSTGRES_DB: vane
    ports:
      - "5432:5432"
    volumes:
      - vane_pg:/var/lib/postgresql/data
      - ./infrastructure/sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./infrastructure/sql/002_pools.sql:/docker-entrypoint-initdb.d/002_pools.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vane -d vane"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vane-redis
    ports:
      - "6379:6379"
    volumes:
      - vane_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vane_pg:
  vane_redis:
